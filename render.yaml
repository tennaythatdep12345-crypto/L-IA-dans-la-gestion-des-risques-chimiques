services:
  - type: web
    name: chemical-risk-backend
    runtime: node
    rootDir: Backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      
      # URL to Flask AI Engine (required)
      - key: FLASK_URL
        value: https://your-flask-Backend.onrender.com
        sync: false
      
      # Allowed Origins for CORS (required for Vercel access)
      # Format: https://your-frontend.vercel.app or comma-separated for multiple
      - key: ALLOWED_ORIGINS
        value: https://your-frontend.vercel.app
        sync: false

